name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release:
    name: Build and publish Windows release
    runs-on: windows-2025-vs2026
    env:
      ELECTRON_CACHE: ${{ github.workspace }}\.cache\electron
      ELECTRON_BUILDER_CACHE: ${{ github.workspace }}\.cache\electron-builder

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Cache Electron build downloads
        uses: actions/cache@v5
        with:
          path: |
            .cache\electron
            .cache\electron-builder
          key: ${{ runner.os }}-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $packageVersion = node -p "require('./package.json').version"
          $expectedTag = "v$packageVersion"
          if ("${{ github.ref_name }}" -ne $expectedTag) {
            throw "Tag ${{ github.ref_name }} does not match package.json version $expectedTag"
          }

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Windows executables
        run: npm run release:win

      - name: Attest release executables
        uses: actions/attest@v4
        with:
          subject-path: release/*.exe

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/*.exe
